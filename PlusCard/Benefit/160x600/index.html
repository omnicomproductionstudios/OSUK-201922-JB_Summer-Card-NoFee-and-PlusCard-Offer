<!doctype html>

<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="ad.size" content="width=160,height=600" />
    <title></title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.13_min.js"></script>
    <script type="text/javascript">
      var clickTag = "%%CLICK_URL_UNESC%%";
    </script>
  </head>

  <body onload="init()">
    <div id="main_container">
      <!--start main_container-->
      <div id="main_content" class="">
        <!-- <img src="images/f4.jpg" class="full-width" style="position: absolute; top: 0px; left: 0px; opacity: .5; z-index: 1111;" alt=""> -->
          <img src="images/bg.jpg" class="full-width" alt="" />
          <div class="copy1" id="copy1">
            <div class="line1">Travel with<br>more.</div>
            <div class="line2">Your <span>first<br>checked bag</span><br>flies free.</div>
          </div>
          <div class="copy2 hidden" id="copy2">
            <div class="line1">And earn<br>more travel.</div>
            <div class="line2">Earn <span>6X points</span><br>toward your<br>next trip.  </div>
          </div>
          <div class="copy3 hidden" id="copy3">
            <div class="line1">See if you<br><span>pre-qualify</span>.</div>
            <div class="line2">No impact<br>to your<br>credit score.</div>
          </div>
          
          <img src="images/card.png" id="card1" alt="" />
          <img src="images/card.png" class="hidden" id="card2" alt="" />
          <img src="images/logo.svg" id="logo" alt="" />
          <img src="images/logo-blue.svg" class="hidden" id="logo-end" alt="" />
          <div class="term" id="term">Terms Apply</div>
          <div class="term hidden" id="term2">Terms Apply</div>
        <!-- last frame -->
        <div class="last-frame" id="lastFrame">
          <div class="copy4 hidden" id="copy4">
            Jet better<br>with the<br><span>JetBlue<br>Plus Card.</span>
          </div>
          <div id="cta" class="hidden">Pre-Qualify Now</div>
        </div>
        <div id="shine"></div>
      </div>

      <div id="default_exit" class="btn"></div>
      <!--end main_container-->
    </div>

    <script type="text/javascript" src="main.js"></script>

    <script type="text/javascript">
      document
        .getElementById("default_exit")
        .addEventListener("click", function () {
          window.open(clickTag, "_blank");
        });
    </script>
  </body>
</html>
